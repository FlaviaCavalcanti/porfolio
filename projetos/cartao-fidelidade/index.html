<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4f0ea0",
                        "background-light": "#f7f6f8",
                        "background-dark": "#181022",
                    },
                    fontFamily: {
                        "display": ["Work Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: "Work Sans", sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-6">
<div class="w-full max-w-md mx-auto flex flex-col items-center gap-8">
<header class="text-center">
<h1 class="text-white text-3xl font-bold tracking-tight mb-2 font-display">Meu Cartão</h1>
<div class="h-1 w-12 bg-primary mx-auto rounded-full"></div>
</header>
<div class="w-full bg-white/5 dark:bg-primary/10 border border-white/10 dark:border-primary/20 rounded-xl p-8 flex flex-col items-center gap-6 shadow-2xl">
<div class="relative p-4 bg-white rounded-xl shadow-inner">
<div class="w-48 h-48" id="qrcode"></div>
</div>
<p class="text-slate-400 text-sm font-medium text-center px-4">
                Apresente o QR Code para ganhar selos
            </p>
</div>
<div class="w-full flex flex-col gap-6">
<div class="flex justify-between items-end px-2">
<h3 class="text-white text-xl font-semibold font-display">Progresso</h3>
<span class="text-primary font-bold text-lg">6 de 10 selos</span>
</div>
<div class="grid grid-cols-5 gap-4 p-2">
<!-- Filled Stamps -->
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<div class="aspect-square rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-white text-2xl">check</span>
</div>
<!-- Empty Stamps -->
<div class="aspect-square rounded-full bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center">
<span class="text-white/20 font-bold">7</span>
</div>
<div class="aspect-square rounded-full bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center">
<span class="text-white/20 font-bold">8</span>
</div>
<div class="aspect-square rounded-full bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center">
<span class="text-white/20 font-bold">9</span>
</div>
<div class="aspect-square rounded-full bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white/20">star</span>
</div>
</div>
</div>
<div class="mt-4 text-center">
<div class="inline-flex items-center gap-2 px-4 py-2 bg-primary/20 rounded-full border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm">info</span>
<span class="text-slate-300 text-xs font-medium">Complete 10 e ganhe uma recompensa</span>
</div>
</div>
</div>
<script>
        const textoQr = "projeto da Mayara, em breve com acesso real de QR Code";

        new QRCode(document.getElementById("qrcode"), {
            text: textoQr,
            width: 192,
            height: 192,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body></html>
